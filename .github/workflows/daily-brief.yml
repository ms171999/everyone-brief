name: Daily Brief

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-brief:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat << 'PYEOF' > generate.py
          import urllib.request
          import urllib.error
          import json
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          api_key = os.environ.get("ANTHROPIC_API_KEY")
          if not api_key:
              print("ERROR: ANTHROPIC_API_KEY not set")
              sys.exit(1)

          # Pacific time (UTC-7 during daylight saving, UTC-8 standard)
          # GitHub Actions runs at 15:00 UTC = 8AM UTC-7 (close enough to 7AM)
          pacific_offset = timedelta(hours=-7)
          now = datetime.now(timezone.utc) + pacific_offset
          today_str = now.strftime("%A, %B %-d, %Y")

          # Iran war day count (started Feb 28, 2026)
          war_start = datetime(2026, 2, 28)
          war_day = (now.replace(tzinfo=None) - war_start).days + 1

          print(f"Generating brief for {today_str} (Iran war day {war_day})")

          prompt = f"""Today is {today_str}. Search the web for today's news, then return ONLY a JSON object (no markdown, no backticks, start with {{, end with }}).

Search for: top news {today_str}, Iran war today, US politics today, stock market today, gas prices today, pop culture news this week, trending gen z word or meme.

Return this JSON structure with real current data:
{{
  "date": "{today_str}",
  "headlines": [10 objects with {{"text": "headline", "tag": "emoji"}}],
  "breaking": {{"show": false, "text": "", "url": ""}},
  "stories": [
    {{"tag": "iran war · day {war_day}", "tagType": "fire", "hed": "...", "dek": "...", "url": "...", "source": "...", "chips": []}},
    {{"tag": "international", "tagType": "geo", "hed": "...", "dek": "...", "url": "...", "source": "...", "chips": []}},
    {{"tag": "domestic", "tagType": "us", "hed": "...", "dek": "...", "url": "...", "source": "...", "chips": []}},
    {{"tag": "domestic", "tagType": "us", "hed": "...", "dek": "...", "url": "...", "source": "...", "chips": []}},
    {{"tag": "spicy take", "tagType": "spicy", "hed": "...", "dek": "...", "url": "...", "source": "...", "chips": []}}
  ],
  "markets": {{
    "sp500": {{"val": "0,000", "chg": "+0.0%", "dir": "up"}},
    "dow": {{"val": "00,000", "chg": "+0.0%", "dir": "up"}},
    "nasdaq": {{"val": "00,000", "chg": "+0.0%", "dir": "up"}},
    "wti": {{"val": "$00", "chg": "-0%", "dir": "down"}},
    "brent": {{"val": "$00", "chg": "-0%", "dir": "down"}},
    "gold": {{"val": "$0,000", "chg": "+0%", "dir": "up"}},
    "btc": {{"val": "$00,000", "chg": "+0%", "dir": "up"}},
    "context": "one sentence why markets moved",
    "url": "https://cnbc.com",
    "source": "CNBC"
  }},
  "gas": {{"avg": "$0.00", "note": "funny one-liner", "premium": "$0.00", "wti": "$00", "highState": "CA: $0.00", "lowState": "OK: $0.00", "url": "https://gasprices.aaa.com", "source": "AAA"}},
  "popCulture": {{"hed": "...", "dek": "...", "url": "...", "source": "..."}},
  "genZ": {{"type": "word", "term": "...", "definition": "...", "usage": "...", "url": "", "source": ""}},
  "tldr": "two sentence summary"
}}

Rules: use real URLs from search results, dry wit, no HTML in strings, pop culture must be from this week, fill all market numbers with actual values."""

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 2500,
              "tools": [{"type": "web_search_20250305", "name": "web_search"}],
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read().decode())
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"HTTP Error {e.code}: {body}")
              sys.exit(1)

          text_blocks = [b["text"] for b in data.get("content", []) if b.get("type") == "text"]
          if not text_blocks:
              print("ERROR: No text in response")
              print(json.dumps(data, indent=2))
              sys.exit(1)

          raw = " ".join(text_blocks)
          raw = raw.replace("```json", "").replace("```", "").strip()

          start = raw.index("{")
          end = raw.rindex("}") + 1
          brief = json.loads(raw[start:end])

          with open("brief-data.json", "w") as f:
              json.dump(brief, f, indent=2, ensure_ascii=False)

          print(f"SUCCESS: Brief generated for {today_str}")
          PYEOF

          python generate.py

      - name: Commit updated brief
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "actions@github.com"
          git add brief-data.json
          git diff --staged --quiet || git commit -m "Daily brief: $(date -u '+%Y-%m-%d')"
          git push
