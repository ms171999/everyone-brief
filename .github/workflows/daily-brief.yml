name: Daily Brief

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py
      - name: Commit updated brief
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "actions@github.com"
          git add brief-data.json
          git diff --staged --quiet || git commit -m "Daily brief: $(date -u '+%Y-%m-%d')"
          git push
